# agent-context.yaml
#
# 作用：给自动化 Agent 提供“可续作”的结构化状态。
# 用法建议：
# 1. 每次进入仓库先读取本文件，再开始分析/修改。
# 2. 每次完成一个可验证步骤后，更新本文件。
# 3. 任何新模型调用前，把本文件内容放入上下文，帮助模型快速恢复：
#    - 我在哪个项目
#    - 目前做到哪一步
#    - 已经改了什么
#    - 还剩什么没做
#    - 卡在哪里
#
# 维护原则：
# - 只记录和当前工作有关的最小必要信息
# - 用结构化字段，不要写成长篇自然语言
# - 保持“当前状态”始终可读、可更新、可恢复

schema_version: 1
project:
  name: tdd-learning-python
  purpose: 面向 Python 初学者的测试驱动开发（TDD）学习仓库，按章节组织教程、练习与示例测试。
  repository_root: .
  default_working_dir: .
  primary_language: python
  test_runner: uv run pytest
  package_name: tdd_learning_python
  learning_structure:
    - chapter: 1
      title: 为什么需要测试
    - chapter: 2
      title: TDD 基本流程
    - chapter: 3
      title: 从函数开始写测试
    - chapter: 4
      title: 从类与对象开始写测试
    - chapter: 5
      title: Mock、边界条件与重构
    - chapter: 6
      title: 测试架构、fixture 与测试数据工厂

agent_state:
  status: done # idle | investigating | modifying | verifying | blocked | done
  current_goal: "补充第6章内容并同步维护 agent-context.yaml"
  current_chapter: 6
  current_task: "第6章文档入口、学习路径与练习说明已完善并完成验证"
  last_updated_at: "2026-07-05"
  last_model_summary: "第六章文档、学习路径、练习说明和状态记录均已对齐，并通过 chapter6 相关测试验证。"
  working_notes:
    - "每次调用模型前，先读取本文件。"
    - "每次完成改动后，更新 current_goal / tasks / verification / blockers。"
    - "如果状态变更，优先更新本文件，再继续下一步。"

context:
  recent_observations:
    - "第六章已补充章节结构、工程化检查清单、推荐测试组织方式与 CLI/E2E 说明。"
    - "README、learning-path 和练习说明已从占位状态改为完成态描述。"
    - "tests/test_chapter6.py 已展示 fixture、工厂、参数化与命名场景的组合方式。"
  relevant_paths:
    docs:
      - docs/learning-path.md
      - docs/chapter-6-outline.md
      - docs/chapter-6-example.md
      - docs/chapter-6-cli-e2e.md
    exercises:
      - exercises/06-test-architecture/README.md
    src:
      - src/tdd_learning_python/chapter6.py
      - src/tdd_learning_python/chapter6_cli.py
    tests:
      - tests/test_chapter6.py
      - tests/test_chapter6_cli_e2e.py

state_fields:
  todo:
    - content: "补充第6章文档内容"
      status: done # pending | in_progress | blocked | done
      owner: agent
      note: "完善章节结构、工程化检查清单和 CLI/E2E 说明"
    - content: "同步维护 agent-context.yaml"
      status: done # pending | in_progress | blocked | done
      owner: agent
      note: "记录当前目标、状态与相关路径"
    - content: "验证第6章相关测试与文档一致性"
      status: done # pending | in_progress | blocked | done
      owner: agent
      note: "chapter6 单元测试和 CLI E2E 已通过"
  decisions:
    - id: "chapter6-docs-scope"
      decision: "优先补齐文档与仓库入口说明，不改动业务实现。"
      reason: "现有实现已完整，主要不一致在文档与状态记录。"
      date: "2026-07-05"
  verification:
    latest_command: "uv run pytest tests/test_chapter6.py tests/test_chapter6_cli_e2e.py -q"
    latest_result: "通过，16 个测试全部通过。"
    coverage_notes: "验证了 chapter6 核心逻辑与 CLI E2E，未修改业务实现。"
  blockers:
    - issue: ""
      impact: ""
      next_action: ""
  next_step: "任务已完成，无进一步操作。"

update_rules:
  - "状态字段要随任务推进持续更新，而不是只在结束时填写。"
  - "todo 列表应尽量具体、可勾选、可验证。"
  - "verification 只记录真实执行过的命令与结果，不要猜测。"
  - "blockers 只记录会影响继续推进的真实阻塞。"
  - "如果任务完成，将 agent_state.status 置为 done，并清空或归档不再需要的中间备注。"
