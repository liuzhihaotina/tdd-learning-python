# agent-context.yaml
#
# 作用：给自动化 Agent 提供“可续作”的结构化状态。
# 用法建议：
# 1. 每次进入仓库先读取本文件，再开始分析/修改。
# 2. 每次完成一个可验证步骤后，更新本文件。
# 3. 任何新模型调用前，把本文件内容放入上下文，帮助模型快速恢复：
#    - 我在哪个项目
#    - 目前做到哪一步
#    - 已经改了什么
#    - 还剩什么没做
#    - 卡在哪里
#
# 维护原则：
# - 只记录和当前工作有关的最小必要信息
# - 用结构化字段，不要写成长篇自然语言
# - 保持“当前状态”始终可读、可更新、可恢复

schema_version: 1
project:
  name: tdd-learning-python
  purpose: 面向 Python 初学者的测试驱动开发（TDD）学习仓库，按章节组织教程、练习与示例测试。
  repository_root: .
  default_working_dir: .
  primary_language: python
  test_runner: uv run pytest
  package_name: tdd_learning_python
  learning_structure:
    - chapter: 1
      title: 为什么需要测试
    - chapter: 2
      title: TDD 基本流程
    - chapter: 3
      title: 从函数开始写测试
    - chapter: 4
      title: 从类与对象开始写测试
    - chapter: 5
      title: Mock、边界条件与重构
    - chapter: 6
      title: 测试架构、fixture 与测试数据工厂

agent_state:
  status: verifying # idle | investigating | modifying | verifying | blocked | done
  current_goal: "统一第2、3、5章文档措辞"
  current_chapter: null
  current_task: "统一 CLI/E2E 与示例文档中的细微措辞"
  last_updated_at: "2026-07-05"
  last_model_summary: "已统一第2、3、5章中的术语与结尾表述，并完成相关 E2E 测试验证。"
  working_notes:
    - "每次调用模型前，先读取本文件。"
    - "每次完成改动后，更新 current_goal / tasks / verification / blockers。"
    - "如果状态变更，优先更新本文件，再继续下一步。"

context:
  recent_observations:
    - "第5章已统一使用“优惠码”作为主术语。"
    - "第2、3、5章 CLI/E2E 结尾的“用户怎么使用这个程序”措辞已对齐。"
    - "第5章示例与 CLI 文档的 cross-link 表述已更贴近第2、3章的结构。"
  relevant_paths:
    docs:
      - docs/chapter-2-cli-e2e.md
      - docs/chapter-2-example.md
      - docs/chapter-3-cli-e2e.md
      - docs/chapter-3-example.md
      - docs/chapter-5-cli-e2e.md
      - docs/chapter-5-example.md
    tests:
      - tests/test_chapter2_cli_e2e.py
      - tests/test_chapter3_cli_e2e.py
      - tests/test_chapter5_cli_e2e.py

state_fields:
  todo:
    - content: "梳理第2、3、5章文档措辞差异"
      status: done # pending | in_progress | blocked | done
      owner: agent
      note: "已确认术语和收尾表述差异"
    - content: "统一第2、3、5章的细微措辞"
      status: done # pending | in_progress | blocked | done
      owner: agent
      note: "已统一优惠码术语和 E2E 结尾句"
    - content: "验证相关文档与测试不受影响"
      status: done # pending | in_progress | blocked | done
      owner: agent
      note: "chapter2/3/5 E2E 测试已通过"
  decisions:
    - id: "style-unification-scope-2-3-5"
      decision: "仅做术语与结尾措辞统一，不扩展到业务实现。"
      reason: "差异集中在文档层，最小改动即可提升一致性。"
      date: "2026-07-05"
  verification:
    latest_command: "uv run pytest tests/test_chapter2_cli_e2e.py tests/test_chapter3_cli_e2e.py tests/test_chapter5_cli_e2e.py -q"
    latest_result: "通过，7 个测试全部通过。"
    coverage_notes: "覆盖第2、3、5章 CLI/E2E 的文档关联场景，确认无回归。"
  blockers:
    - issue: ""
      impact: ""
      next_action: ""
  next_step: "如需提交，可直接 git add/commit；否则任务已完成。"

update_rules:
  - "状态字段要随任务推进持续更新，而不是只在结束时填写。"
  - "todo 列表应尽量具体、可勾选、可验证。"
  - "verification 只记录真实执行过的命令与结果，不要猜测。"
  - "blockers 只记录会影响继续推进的真实阻塞。"
  - "如果任务完成，将 agent_state.status 置为 done，并清空或归档不再需要的中间备注。"
