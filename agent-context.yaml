# agent-context.yaml
#
# 作用：给自动化 Agent 提供“可续作”的结构化状态。
# 用法建议：
# 1. 每次进入仓库先读取本文件，再开始分析/修改。
# 2. 每次完成一个可验证步骤后，更新本文件。
# 3. 任何新模型调用前，把本文件内容放入上下文，帮助模型快速恢复：
#    - 我在哪个项目
#    - 目前做到哪一步
#    - 已经改了什么
#    - 还剩什么没做
#    - 卡在哪里
#
# 维护原则：
# - 只记录和当前工作有关的最小必要信息
# - 用结构化字段，不要写成长篇自然语言
# - 保持“当前状态”始终可读、可更新、可恢复

schema_version: 1
project:
  name: tdd-learning-python
  purpose: 面向 Python 初学者的测试驱动开发（TDD）学习仓库，按章节组织教程、练习与示例测试。
  repository_root: .
  default_working_dir: .
  primary_language: python
  test_runner: uv run pytest
  package_name: tdd_learning_python
  learning_structure:
    - chapter: 1
      title: 为什么需要测试
    - chapter: 2
      title: TDD 基本流程
    - chapter: 3
      title: 从函数开始写测试
    - chapter: 4
      title: 从类与对象开始写测试
    - chapter: 5
      title: Mock、边界条件与重构
    - chapter: 6
      title: 测试架构、fixture 与测试数据工厂

agent_state:
  status: modifying # idle | investigating | modifying | verifying | blocked | done
  current_goal: "统一前1~6章文档风格"
  current_chapter: null
  current_task: "对齐章节示例、CLI/E2E 文档和导读风格"
  last_updated_at: "2026-07-05"
  last_model_summary: "已完成第1、4、6章示例与导读文档的风格统一，并验证相关测试通过。"
  working_notes:
    - "每次调用模型前，先读取本文件。"
    - "每次完成改动后，更新 current_goal / tasks / verification / blockers。"
    - "如果状态变更，优先更新本文件，再继续下一步。"

context:
  recent_observations:
    - "第1、4、6章的示例文档已统一为 需求 / 为什么 / 推荐顺序 / 代码位置 / 你应该观察什么 的结构。"
    - "第1章 CLI 文档已补充非数字输入说明，并保持与第2、3、5、6章的 E2E 风格接近。"
    - "第6章导读标题已改为学习导读，以区别于实战示例。"
  relevant_paths:
    docs:
      - docs/chapter-1-example.md
      - docs/chapter-1-cli-e2e.md
      - docs/chapter-2-example.md
      - docs/chapter-2-cli-e2e.md
      - docs/chapter-3-example.md
      - docs/chapter-3-cli-e2e.md
      - docs/chapter-4-example.md
      - docs/chapter-4-cli-e2e.md
      - docs/chapter-5-example.md
      - docs/chapter-5-cli-e2e.md
      - docs/chapter-6-example.md
      - docs/chapter-6-cli-e2e.md
      - docs/chapter-6-outline.md
    exercises:
      - exercises/06-test-architecture/README.md
    src:
      - src/tdd_learning_python/chapter1.py
      - src/tdd_learning_python/chapter4.py
      - src/tdd_learning_python/chapter6.py
    tests:
      - tests/test_chapter1.py
      - tests/test_cli_e2e.py
      - tests/test_chapter4.py
      - tests/test_chapter4_cli_e2e.py
      - tests/test_chapter6.py
      - tests/test_chapter6_cli_e2e.py

state_fields:
  todo:
    - content: "统一前1~6章文档风格"
      status: in_progress # pending | in_progress | blocked | done
      owner: agent
      note: "正在对齐章节结构、措辞和跨章节跳转"
    - content: "验证统一后的章节测试"
      status: done # pending | in_progress | blocked | done
      owner: agent
      note: "chapter1 / chapter4 / chapter6 相关测试已通过"
  decisions:
    - id: "style-unification-scope"
      decision: "优先统一章节示例与 CLI/E2E 的文档结构，不改动业务实现。"
      reason: "风格差异主要集中在文档标题、段落顺序和收尾跳转。"
      date: "2026-07-05"
  verification:
    latest_command: "uv run pytest tests/test_chapter1.py tests/test_chapter4.py tests/test_chapter6.py tests/test_cli_e2e.py tests/test_chapter4_cli_e2e.py tests/test_chapter6_cli_e2e.py -q"
    latest_result: "通过，32 个测试全部通过。"
    coverage_notes: "覆盖了第1、4、6章核心测试与 E2E，确认文档改动未影响实现。"
  blockers:
    - issue: ""
      impact: ""
      next_action: ""
  next_step: "如需进一步统一第2、3、5章的细微措辞，可继续做小范围文档润色。"

update_rules:
  - "状态字段要随任务推进持续更新，而不是只在结束时填写。"
  - "todo 列表应尽量具体、可勾选、可验证。"
  - "verification 只记录真实执行过的命令与结果，不要猜测。"
  - "blockers 只记录会影响继续推进的真实阻塞。"
  - "如果任务完成，将 agent_state.status 置为 done，并清空或归档不再需要的中间备注。"
